# ═══════════════════════════════════════════
# MQTT Broker (Mosquitto) 配置文件
# 远程驾驶系统 - 公网部署配置
# ═══════════════════════════════════════════

# ────────────────────────
# §1 基础配置
# ────────────────────────

# 监听端口（MQTT TCP）
listener 1883 0.0.0.0
protocol mqtt

# TLS/SSL 监听端口（生产环境推荐，证书配置完成后启用）
# listener 8883 0.0.0.0
# protocol mqtt
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false
# tls_version tlsv1.2

# WebSocket 支持（用于防火墙穿透，证书配置完成后启用）
# listener 9001 0.0.0.0
# protocol websockets
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key

# ────────────────────────
# §2 连接与异常处理
# ────────────────────────

# 最大连接数（根据实际负载调整）
max_connections 1000

# 连接消息日志
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# Keep-Alive 配置（防止 NAT 超时）
# 注意：Mosquitto 2.0 中 keepalive 由客户端设置，Broker 自动处理
# keepalive_interval 选项在 Mosquitto 2.0 中已移除

# 消息队列大小（防止消息堆积）
max_queued_messages 1000
max_inflight_messages 20
max_queued_bytes 100MB

# 消息过期时间（秒，0=不过期）
# 注意：Mosquitto 2.0 中 message_expiry_interval 选项已移除，由客户端控制

# ────────────────────────
# §3 认证与授权
# ────────────────────────

# 允许匿名连接（开发环境可设为 true，生产环境应设为 false）
# 注意：初始化脚本会创建密码文件后，可以改为 false 并启用 password_file
allow_anonymous true

# 密码文件（用户名/密码认证）
# 初始化脚本会自动创建，创建后取消注释以下行并设置 allow_anonymous false
# password_file /mosquitto/config/passwd

# ACL 文件（主题访问控制）
# 初始化脚本会自动创建，创建后取消注释以下行
# acl_file /mosquitto/config/acl

# ────────────────────────
# §4 持久化与可靠性
# ────────────────────────

# 持久化存储（QoS 1/2 消息）
persistence true
persistence_location /mosquitto/data/

# 持久化文件大小限制
persistence_file mosquitto.db
# max_packet_size 选项在 Mosquitto 2.0 中已移除，由协议自动处理

# 自动保存间隔（秒）
autosave_interval 60

# ────────────────────────
# §5 日志与监控
# ────────────────────────

# 日志类型
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type all

# 日志级别
log_facility 5

# ────────────────────────
# §6 性能优化
# ────────────────────────

# 内存限制（防止内存溢出）
# 注意：Mosquitto 2.x 不支持此选项，使用系统限制

# 线程数（自动检测，无需手动设置）

# ────────────────────────
# §7 安全配置
# ────────────────────────

# 禁止旧协议版本（仅支持 MQTT 3.1.1 和 5.0）
# protocol_version mqttv31  # 禁用 MQTT 3.1
# protocol_version mqttv311  # 启用 MQTT 3.1.1
# protocol_version mqttv5    # 启用 MQTT 5.0

# 客户端 ID 验证（防止冲突）
# 注意：clean_session=false 时，相同 client_id 会导致旧连接断开

# ────────────────────────
# §8 消息保留
# ────────────────────────

# 消息保留（Retained Messages）
# 用于最后已知状态，客户端订阅时立即收到
retained_persistence true
