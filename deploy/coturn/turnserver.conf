# Coturn TURN/STUN 服务器配置
# 用于 WebRTC NAT 穿透

# 监听地址和端口
listening-port=3478
tls-listening-port=5349

# 中继端口范围（与 docker-compose 映射 60000-60100 一致，避免主机 49152-65535 冲突）
min-port=60000
max-port=60100

# 认证
# 用户名和密码通过环境变量 TURN_USERNAME 和 TURN_PASSWORD 传入
# 格式: username:password
# 示例: teleop:teleop_turn_password_change_in_prod

# Realm
realm=teleop.local

# 日志
log-file=/var/log/turnserver.log
verbose

# 安全
no-cli
no-tls
no-dtls

# 允许的 IP 范围（根据实际网络环境调整）
# 允许所有 IP（开发环境）
# 生产环境应限制为特定网段
# allowed-peer-ip=192.168.0.0-192.168.255.255

# 禁止的 IP 范围
denied-peer-ip=0.0.0.0-0.0.0.0
denied-peer-ip=::0-::0

# 用户数据库（使用静态用户，通过环境变量配置）
# 生产环境建议使用 Redis 或 PostgreSQL 动态用户数据库
# userdb=/var/lib/turn/turndb

# 外部 IP（如果服务器在 NAT 后，需要指定公网 IP）
# 通过环境变量 COTURN_EXTERNAL_IP 传入
# external-ip=YOUR_PUBLIC_IP

# 指纹
fingerprint

# 长期凭证机制
lt-cred-mech

# 使用长期凭证
use-auth-secret
static-auth-secret=${TURN_PASSWORD:-teleop_turn_password_change_in_prod}

# 禁止多播
no-multicast-peers

# 禁止 STUN 绑定请求
no-stun-backward-compatibility

# 进程用户（容器内运行，使用默认用户）
# proc-user=turnserver
# proc-group=turnserver

# 数据库（可选，用于动态用户管理）
# userdb=/var/lib/turn/turndb
# psql-userdb="host=postgres port=5432 dbname=turndb user=turnuser password=turnpass connect_timeout=30"

# 性能优化
total-quota=100
user-quota=8
max-bps=1000000

# 日志级别
# 0 = OFF, 1 = FATAL, 2 = ERROR, 3 = WARN, 4 = INFO, 5 = DEBUG, 6 = TRACE
log-level=4
